name: Auto-update rpc-go-bin

# Checks daily for new upstream rpc-go releases and pushes to AUR if found.
# Does NOT require a new tag on this repo — runs against current main.

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  check-and-publish:
    name: Check upstream and publish if newer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare upstream vs current PKGBUILD version
        id: compare
        run: |
          UPSTREAM=$(curl -s https://api.github.com/repos/device-management-toolkit/rpc-go/releases/latest | jq -r .tag_name | tr -d v)
          CURRENT=$(grep '^pkgver=' packaging/aur/rpc-go-bin/PKGBUILD | cut -d= -f2)
          echo "upstream=$UPSTREAM" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT"  >> "$GITHUB_OUTPUT"
          if [ "$UPSTREAM" = "$CURRENT" ]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "rpc-go already at $CURRENT — nothing to do"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "Upgrade: $CURRENT -> $UPSTREAM"
          fi

      - name: Compute new SHA256
        if: steps.compare.outputs.needs_update == 'true'
        id: sha
        run: |
          SHA=$(curl -sL "https://github.com/device-management-toolkit/rpc-go/releases/download/v${{ steps.compare.outputs.upstream }}/rpc_linux_x64.tar.gz" | sha256sum | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD and .SRCINFO in repo
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          NEW="${{ steps.compare.outputs.upstream }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          sed -i "s/^pkgver=.*/pkgver=$NEW/" packaging/aur/rpc-go-bin/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" packaging/aur/rpc-go-bin/PKGBUILD
          sed -i "s/sha256sums_x86_64=.*/sha256sums_x86_64=('$SHA')/" packaging/aur/rpc-go-bin/PKGBUILD
          # Regenerate .SRCINFO
          sed -i "s/pkgver = .*/pkgver = $NEW/" packaging/aur/rpc-go-bin/.SRCINFO
          sed -i "s/pkgrel = .*/pkgrel = 1/" packaging/aur/rpc-go-bin/.SRCINFO
          sed -i "s|rpc_linux_x64-.*.tar.gz|rpc_linux_x64-$NEW.tar.gz|" packaging/aur/rpc-go-bin/.SRCINFO
          sed -i "s|releases/download/v.*/rpc_linux_x64|releases/download/v$NEW/rpc_linux_x64|" packaging/aur/rpc-go-bin/.SRCINFO
          sed -i "s/sha256sums_x86_64 = .*/sha256sums_x86_64 = $SHA/" packaging/aur/rpc-go-bin/.SRCINFO

      - name: Commit PKGBUILD bump
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          git config user.name  "88plug-bot"
          git config user.email "andrew@88plug.com"
          git add packaging/aur/rpc-go-bin/
          git commit -m "auto: bump rpc-go-bin to ${{ steps.compare.outputs.upstream }}"
          git push origin main

      - name: Publish to AUR
        if: steps.compare.outputs.needs_update == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: rpc-go-bin
          pkgbuild: packaging/aur/rpc-go-bin/PKGBUILD
          commit_username: 88plug
          commit_email: andrew@88plug.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Auto-update to ${{ steps.compare.outputs.upstream }}"
          force_push: true
