name: AUR Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-rpc-go-bin:
    name: Publish rpc-go-bin to AUR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract rpc-go version from GitHub
        id: rpcver
        run: |
          VER=$(curl -s https://api.github.com/repos/device-management-toolkit/rpc-go/releases/latest | jq -r .tag_name | tr -d v)
          SHA=$(curl -sL "https://github.com/device-management-toolkit/rpc-go/releases/download/v${VER}/rpc_linux_x64.tar.gz" | sha256sum | awk '{print $1}')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA"  >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.rpcver.outputs.version }}/" packaging/aur/rpc-go-bin/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" packaging/aur/rpc-go-bin/PKGBUILD
          sed -i "s/sha256sums_x86_64=.*/sha256sums_x86_64=('${{ steps.rpcver.outputs.sha256 }}')/" packaging/aur/rpc-go-bin/PKGBUILD

      - name: Publish rpc-go-bin to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: rpc-go-bin
          pkgbuild: packaging/aur/rpc-go-bin/PKGBUILD
          commit_username: 88plug
          commit_email: andrew@88plug.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.rpcver.outputs.version }}"
          force_push: true

  deploy-intel-amt-activate:
    name: Publish intel-amt-activate to AUR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update PKGBUILD
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.ver.outputs.version }}/" packaging/aur/intel-amt-activate/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" packaging/aur/intel-amt-activate/PKGBUILD

      - name: Publish intel-amt-activate to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: intel-amt-activate
          pkgbuild: packaging/aur/intel-amt-activate/PKGBUILD
          commit_username: 88plug
          commit_email: andrew@88plug.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.ver.outputs.version }}"
          force_push: true
